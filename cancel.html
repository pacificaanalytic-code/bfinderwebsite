<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Cancelled – Nomad Beauty Workers</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9fafb;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      max-width: 440px;
      width: 100%;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 48px 36px;
      text-align: center;
    }
    .icon-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #fff7ed;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .x-icon {
      width: 40px;
      height: 40px;
      stroke: #f59e0b;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 15px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 36px;
    }
    .btn-primary {
      display: block;
      background: #1a1a2e;
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.2s;
      width: 100%;
      margin-bottom: 12px;
    }
    .btn-primary:hover { background: #2d2d44; }
    .btn-secondary {
      display: block;
      background: transparent;
      color: #6b7280;
      font-size: 14px;
      font-weight: 500;
      padding: 12px 32px;
      border-radius: 12px;
      text-decoration: none;
      border: 1px solid #e5e7eb;
      transition: background 0.2s, color 0.2s;
      width: 100%;
    }
    .btn-secondary:hover { background: #f3f4f6; color: #1a1a2e; }
    .note {
      margin-top: 20px;
      font-size: 13px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-circle">
      <svg class="x-icon" viewBox="0 0 48 48">
        <circle cx="24" cy="24" r="20" stroke="#f59e0b" stroke-width="2.5" fill="none"/>
        <line x1="24" y1="14" x2="24" y2="26"/>
        <circle cx="24" cy="32" r="1.5" fill="#f59e0b" stroke="none"/>
      </svg>
    </div>

    <h1>Payment Cancelled</h1>
    <p class="subtitle">
      Your payment was not completed and you have not been charged.
      You can try again whenever you're ready — your subscription options are waiting for you.
    </p>

    <a class="btn-primary" href="nomadbeautyworkers://subscription">Try Again</a>
    <a class="btn-secondary" href="nomadbeautyworkers://">Back to App</a>

    <p class="note">
      Need help? Contact us at
      <a href="mailto:support@nomadbeautyworkers.com" style="color:#6b7280;">support@nomadbeautyworkers.com</a>
    </p>
  </div>
</body>
</html>
